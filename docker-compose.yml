services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: idideration
      POSTGRES_PASSWORD: idideration
      POSTGRES_DB: idideration
    ports:
      - "5434:5432"
    volumes:
      - idideration_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://idideration:idideration@db:5432/idideration
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      NARRALYTICA_API_URL: http://host.docker.internal:8005/api
      APP_HOST: 0.0.0.0
      APP_PORT: 8006
    depends_on:
      - db
    volumes:
      - ./projects:/app/projects
    restart: unless-stopped

volumes:
  idideration_pgdata:
