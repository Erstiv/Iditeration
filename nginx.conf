server {
    listen 80;
    server_name idideration.quietferal.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name idideration.quietferal.com;

    ssl_certificate /etc/letsencrypt/live/quietferal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quietferal.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;  # Long timeout for agent runs
        proxy_send_timeout 600s;
    }
}
