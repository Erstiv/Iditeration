<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Idideration{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a2e;
            --surface-hover: #222240;
            --border: #2a2a45;
            --text: #e0e0e8;
            --text-dim: #8888a0;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --blue: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
        .navbar h1 span { color: var(--accent); }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .card h2 { font-size: 1.1rem; margin-bottom: 0.75rem; }
        .card h3 { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 0.5rem; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

        input, select, textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            width: 100%;
            font-size: 0.9rem;
        }
        textarea { min-height: 100px; resize: vertical; font-family: inherit; }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.25rem; }

        .btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-success { background: var(--green); color: white; }
        .btn-danger { background: var(--red); color: white; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { padding: 0.25rem 0.75rem; font-size: 0.75rem; }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-pending { background: var(--border); color: var(--text-dim); }
        .badge-running { background: #1e3a5f; color: var(--blue); }
        .badge-completed { background: #14532d; color: var(--green); }
        .badge-failed { background: #450a0a; color: var(--red); }

        .form-group { margin-bottom: 1rem; }
        .form-row { display: flex; gap: 1rem; }
        .form-row > * { flex: 1; }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
        th { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

        .agent-status { display: flex; align-items: center; gap: 0.5rem; margin: 0.25rem 0; }
        .agent-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-pending { background: var(--text-dim); }
        .dot-running { background: var(--blue); animation: pulse 1s infinite; }
        .dot-completed { background: var(--green); }
        .dot-failed { background: var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 3rem;
        }
        .empty-state p { margin-top: 0.5rem; }

        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .text-dim { color: var(--text-dim); }
        .text-sm { font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1><a href="/"><span>id</span>ideration</a></h1>
        <div class="text-sm text-dim">AI Marketing Strategy</div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
